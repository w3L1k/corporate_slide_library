name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Проверка MVP
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Получить исходный код
        uses: actions/checkout@v6

      - name: Настроить Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Установить зависимости
        run: npm ci

      - name: Проверить проект
        run: npm run check
